<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --egyptair-blue: #001a4d;
            --cyan-glow: #00e5ff;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #000;
            overflow-x: hidden;
        }

        /* --- Navbar --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(0, 0, 0, 0.9);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--white);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span { color: var(--cyan-glow); }

        .airport-info {
            color: var(--white);
            font-size: 13px;
            background: rgba(0, 229, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #clock { color: var(--cyan-glow); font-weight: 700; }

        nav ul { display: flex; list-style: none; gap: 20px; }
        nav ul li a {
            text-decoration: none;
            color: var(--white);
            font-size: 13px;
            transition: 0.3s;
            position: relative;
            padding-bottom: 5px;
        }

        nav ul li a.active::after, nav ul li a:hover::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: 0;
            left: 0;
            background: var(--cyan-glow);
        }

        /*  */
        .plane-anim {
            position: absolute;
            top: 75px; /* */
            color: var(--cyan-glow);
            font-size: 20px;
            z-index: 999;
            pointer-events: none;
            animation: flyAcross 12s linear infinite;
            filter: drop-shadow(0 0 5px var(--cyan-glow));
        }

        @keyframes flyAcross {
            0% { left: -50px; opacity: 0; transform: rotate(0deg); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 100%; opacity: 0; transform: rotate(0deg); }
        }

        /*  */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;      
            justify-content: center; 
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.6)), 
                url('enhanced1/enhanced.jpg'); 
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .hero-content {
            max-width: 650px;
            z-index: 10;
            padding: 30px;
            background: rgba(0, 0, 0, 0.2); /* */
            backdrop-filter: blur(4px);
            border-radius: 20px;
            text-align: center;
        }


        .btn-book {
            padding: 15px 45px;
            background: linear-gradient(45deg, #008cff, #00e5ff);
            color: var(--white);
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            transition: 0.4s;
            display: inline-block;
        }

        .btn-book:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 35px rgba(0, 229, 255, 0.8);
           
        }
         /**/
         .booking-form {
             display: flex;
             flex-direction: column;
             gap: 15px;
             width: 300px;
        }

        .booking-form input {
         padding: 12px 15px;
         border-radius: 30px;
         border: 1px solid rgba(0, 229, 255, 0.3);
         background: rgba(255,255,255,0.1);
         color: white;
         outline: none;
         font-size: 14px;
        }

        .booking-form input::placeholder {
            color: #ccc;
        }

        .booking-form input:focus {
          border-color: #00e5ff;
          box-shadow: 0 0 10px rgba(0,229,255,0.5);
        }

         /**/

        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.8);
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes pulseGlow {
            from { text-shadow: 0 0 15px rgba(0, 229, 255, 0.8); }
            to { text-shadow: 0 0 35px rgba(0, 229, 255, 1); }
        }
    </style>
</head>
<body>
    <header>
        <a href="Home.html" class="logo">EGYPT <span>AIR ✈</span></a>
        
        <div class="airport-info">
            <span id="clock">00:00:00</span>
            <span>|</span>
            <span>Cairo, EG 23°C 🌤</span>
        </div>

        <nav>
            <ul>
                <li><a href="Home.html">Home</a></li>
                <li><a href="Flights.html">Flights</a></li>
                <li><a href="booking.html" class="active">Booking</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
    
            <form class="booking-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <input type="text" placeholder="Flight Number" required>
                <input type="date" required>
    
                <button type="submit" class="btn-book">Book Now!</button>
            </form>
    
        </div>
    </section>
    
    <footer>
        <p>© 2026 Egypt Air | Airport Management System</p>
        <p>Managed by Team: Haneen, Rokia, Sahar, Bassam, Ramy & Ahmed</p>
    </footer>
    

    <script>
        function updateClock() {
                    const now = new Date();
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    const seconds = String(now.getSeconds()).padStart(2, '0');
                    document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
                }
                setInterval(updateClock, 1000);
                updateClock();
        </script>
        
    
    
</body>
</html>
